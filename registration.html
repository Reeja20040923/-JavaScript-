<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration & Login</title>
  <style>
    body {
      font-family: Arial;
      background: #120f0f;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }
    .container {
      width: 350px;
      background: rgb(239, 231, 6);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgb(109, 231, 3);
    }
    h2 {
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
    button {
      width: 95%;
      padding: 10px;
      background: rgb(231, 4, 4);
      color: rgb(243, 235, 241);
      border: none;
      cursor: pointer;
    }
    .message {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
    .toggle {
      text-align: center;
      margin-top: 10px;
      cursor: pointer;
      color: blue;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Registration Form -->
  <div id="registerForm">
    <h2>Register</h2>
    <input type="text" id="regUsername" placeholder="Username">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <button onclick="register()">Register</button>
    <div class="message" id="regMsg"></div>
    <div class="toggle" onclick="showLogin()">Already have account? Login</div>
  </div>

  <!-- Login Form -->
  <div id="loginForm" style="display:none;">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="message" id="loginMsg"></div>
    <div class="toggle" onclick="showRegister()">Create account</div>
  </div>

</div>

<script>
  function showLogin() {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
  }

  function showRegister() {
    document.getElementById("registerForm").style.display = "block";
    document.getElementById("loginForm").style.display = "none";
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function register() {
    let username = document.getElementById("regUsername").value.trim();
    let email = document.getElementById("regEmail").value.trim();
    let password = document.getElementById("regPassword").value.trim();
    let msg = document.getElementById("regMsg");

    msg.innerHTML = "";
    msg.className = "message";

    // Validation
    if (!username || !email || !password) {
      msg.innerHTML = "All fields required";
      msg.classList.add("error");
      return;
    }

    if (!validateEmail(email)) {
      msg.innerHTML = "Invalid email format";
      msg.classList.add("error");
      return;
    }

    if (password.length < 6) {
      msg.innerHTML = "Password must be at least 6 characters";
      msg.classList.add("error");
      return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Check duplicate email
    let exists = users.find(user => user.email === email);
    if (exists) {
      msg.innerHTML = "Email already registered";
      msg.classList.add("error");
      return;
    }

    users.push({ username, email, password });
    localStorage.setItem("users", JSON.stringify(users));

    msg.innerHTML = "Registration Successful!";
    msg.classList.add("success");

    // Clear fields
    document.getElementById("regUsername").value = "";
    document.getElementById("regEmail").value = "";
    document.getElementById("regPassword").value = "";
  }

  function login() {
    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value.trim();
    let msg = document.getElementById("loginMsg");

    msg.innerHTML = "";
    msg.className = "message";

    if (!email || !password) {
      msg.innerHTML = "All fields required";
      msg.classList.add("error");
      return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.email === email && u.password === password);

    if (user) {
      msg.innerHTML = "Login Successful!";
      msg.classList.add("success");
    } else {
      msg.innerHTML = "Invalid Credentials";
      msg.classList.add("error");
    }
  }
</script>

</body>
</html>
